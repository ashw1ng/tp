---
layout: default
---

<div class="page-with-sidebar">
  <div class="sidebar-toc-launcher-rail">
    <button
      class="sidebar-toc-launcher"
      id="sidebar-toc-launcher"
      type="button"
      aria-expanded="false"
      aria-controls="sidebar-toc"
    >
      Contents
    </button>
  </div>
  <div class="sidebar-toc-backdrop" id="sidebar-toc-backdrop" hidden></div>

  <nav class="sidebar-toc" id="sidebar-toc" aria-label="Page contents">
    <button
      class="sidebar-toc-toggle"
      id="sidebar-toc-toggle"
      type="button"
      aria-expanded="false"
      aria-controls="toc-list"
    >
      <span class="sidebar-toc-title">On this page</span>
      <span class="sidebar-toc-toggle-icon" aria-hidden="true"></span>
    </button>
    <ul id="toc-list" hidden></ul>
  </nav>

  <article class="post sidebar-main-content">
    <header class="post-header">
      <h1 class="post-title">{{ page.title | escape }}</h1>
    </header>

    <div class="post-content">{{ content }}</div>
  </article>
</div>

<script>
  (function () {
    var headings = document.querySelectorAll('.post-content h2, .post-content h3');
    var toc = document.getElementById('sidebar-toc');
    var tocList = document.getElementById('toc-list');
    var tocToggle = document.getElementById('sidebar-toc-toggle');
    var tocLauncher = document.getElementById('sidebar-toc-launcher');
    var tocBackdrop = document.getElementById('sidebar-toc-backdrop');
    var desktopQuery = window.matchMedia('(min-width: 1280px)');

    function setTocExpanded(isExpanded) {
      toc.setAttribute('data-mobile-open', String(isExpanded));
      tocToggle.setAttribute('aria-expanded', String(isExpanded));
      tocLauncher.setAttribute('aria-expanded', String(isExpanded));
      tocList.hidden = !isExpanded;
      tocBackdrop.hidden = !isExpanded;
      document.body.classList.toggle('sidebar-toc-open', isExpanded && !desktopQuery.matches);
    }

    function syncTocMode(event) {
      setTocExpanded(event.matches);
    }

    headings.forEach(function (h) {
      var li = document.createElement('li');
      li.className = 'toc-entry toc-' + h.tagName.toLowerCase();

      var a = document.createElement('a');
      a.href = '#' + h.id;
      // Strip any trailing "↑ Back to …" text that may appear in heading text nodes
      a.textContent = h.textContent.replace(/\s*↑.*$/u, '').trim();

      li.appendChild(a);
      tocList.appendChild(li);
    });

    tocLauncher.addEventListener('click', function () {
      if (desktopQuery.matches) {
        return;
      }

      setTocExpanded(true);
    });

    tocToggle.addEventListener('click', function () {
      if (desktopQuery.matches) {
        return;
      }

      setTocExpanded(false);
    });

    tocBackdrop.addEventListener('click', function () {
      if (!desktopQuery.matches) {
        setTocExpanded(false);
      }
    });

    if (typeof desktopQuery.addEventListener === 'function') {
      desktopQuery.addEventListener('change', syncTocMode);
    } else if (typeof desktopQuery.addListener === 'function') {
      desktopQuery.addListener(syncTocMode);
    }

    syncTocMode(desktopQuery);

    // Highlight the sidebar link for the heading currently closest to the top
    var links = Array.from(tocList.querySelectorAll('a'));

    function setActive() {
      var scrollY = window.scrollY + 80; // offset so highlight fires a bit early
      var current = null;
      headings.forEach(function (h) {
        if (h.offsetTop <= scrollY) {
          current = h;
        }
      });
      links.forEach(function (link) {
        link.classList.toggle(
          'toc-active',
          current !== null && link.getAttribute('href') === '#' + current.id,
        );
      });
    }

    links.forEach(function (link) {
      link.addEventListener('click', function () {
        if (!desktopQuery.matches) {
          setTocExpanded(false);
        }
      });
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape' && !desktopQuery.matches) {
        setTocExpanded(false);
      }
    });

    window.addEventListener('scroll', setActive, { passive: true });
    setActive();
  })();
</script>
